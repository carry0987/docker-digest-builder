name: Docker Digest Builder
description: >
  Build and push a single-platform Docker image by digest,
  then upload it as an artifact for multi-arch manifest merging.
branding:
  icon: 'box'
  color: 'blue'

inputs:
  image:
    description: 'Full image name (e.g. ghcr.io/org/app)'
    required: true
  platform:
    description: 'Target platform (e.g. linux/amd64)'
    required: true
  file:
    description: 'Path to Dockerfile'
    required: false
    default: './Dockerfile'
  context:
    description: 'Build context path'
    required: false
    default: '.'
  build-args:
    description: 'Build arguments (multi-line)'
    required: false
    default: ''
  provenance:
    description: 'Whether to embed provenance attestation (enables unknown/unknown platform entry)'
    required: false
    default: 'true'
  sbom:
    description: 'Whether to embed SBOM attestation (enables extra unknown/unknown platform entry)'
    required: false
    default: 'false'
  pull:
    description: 'Always pull the latest base image'
    required: false
    default: 'false'
  cache-scope:
    description: 'GitHub Actions cache scope (defaults to platform slug)'
    required: false
    default: ''
  artifact-name-prefix:
    description: 'Artifact name prefix for the digest upload'
    required: false
    default: 'digests'
  retention-days:
    description: 'Number of days to retain the digest artifact'
    required: false
    default: '1'

outputs:
  digest:
    description: 'The sha256 digest of the pushed image'

runs:
  using: node24
  main: dist/index.cjs
